version: "3.8"

services:
  app:
    build: .
    container_name: campaign-streamlit
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    volumes:
      # Persist database and generated assets to your host for convenience
      - ./database.json:/app/database.json
      - ./storage:/app/storage
      # Optional: mount campaigns folder if you add one later
      # - ./campaigns:/app/campaigns
    restart: unless-stopped
